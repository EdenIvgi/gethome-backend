# Render Blueprint — defines the free-tier API service.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: gethome-api
    env: node              # newer spec key (was: runtime)
    plan: free             # 512MB RAM, sleeps after 15min idle
    region: frankfurt
    branch: main
    buildCommand: npm install --omit=dev   # npm ci is stricter; install is safer for first deploy
    startCommand: node index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Do NOT set PORT — Render injects it dynamically (10000-range).
      # Our config.js reads `process.env.PORT || 3001`, so it will use Render's value.

      # ---- Required secrets — set these manually in the Render dashboard ----
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false

      # ---- Optional ----
      - key: CLIENT_URL
        sync: false
